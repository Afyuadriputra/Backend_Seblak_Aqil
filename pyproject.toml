[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-ra"
markers = [
  "smoke: quick API smoke tests",
  "security: security and hardening tests",
  "integration: cross-module integration tests",
  "fuzz: fuzz/property-based tests",
  "slow: slow tests not run by default",
  "performance: manual performance tests",
]
